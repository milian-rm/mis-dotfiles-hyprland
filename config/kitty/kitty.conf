###############################################################
#                                                             #
#   FernuDev DotFiles — Linen & Steel                        #
#                                                             #
###############################################################
font_family      JetBrains Mono
font_size 14.5
cursor_shape block
cursor_beam_thickness 1.5
background_opacity 0.35
window_padding_width 20

foreground #f0ece4
background #161b22
cursor     #7eb8c9

# Black (slate dark / slate medium)
color0  #2e3440
color8  #4c566a

# Red (dusty rose)
color1  #c4738a
color9  #e8929e

# Green (sage)
color2  #6a9e82
color10 #88c4a0

# Yellow (warm gold)
color3  #d4a843
color11 #f0c86a

# Blue (steel)
color4  #5b8db8
color12 #7ab0d8

# Magenta (mauve)
color5  #9b7ec8
color13 #b99ee0

# Cyan (glacier)
color6  #7eb8c9
color14 #9ed4e4

# White (linen)
color7  #c8c0b4
color15 #f0ece4

# Pestaña nueva, en el mismo directorio (sobreescribe el ctrl+shift+t por defecto)
map ctrl+shift+t new_tab_with_cwd

# Ventana de kitty completamente nueva (otro OS window), también en el mismo directorio
map ctrl+shift+n new_os_window_with_cwd
