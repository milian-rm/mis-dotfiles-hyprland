# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

input {
	kb_layout = latam
}

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun -theme ~/.config/rofi/theme.rasi
$browser = firefox

# Variables Qt
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

#Fondo de Pantalla
exec-once = awww-daemon
exec-once = ~/.local/bin/set-wallpaper.sh

exec-once = hyprctl dispatch workspace 1

#PANTALLA DE BLOQUEO
exec-once = pkill swayidle; swayidle -w \
    timeout 600 'hyprlock &' \
    timeout 720 'systemctl suspend' \
    resume 'hyprctl dispatch dpms on' \
    before-sleep 'pidof hyprlock || hyprlock --immediate; sleep 2'

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
col.active_border = rgba(ffffffff) rgba(333333ff) 45deg
col.inactive_border = rgba(595959aa)
    resize_on_border = true
    layout = dwindle
    allow_tearing = false
}

decoration {
    active_opacity = 1
    inactive_opacity = 0.96
    rounding = 5
	blur {
        	enabled = true
	       size = 8
        	passes = 2
	       new_optimizations = true
	   }
	shadow {
	   enabled = yes
	   range = 10
	   render_power = 5
	#	color = rgba(cc000099)
	}
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
#    pseudotile = yes
    preserve_split = yes
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

xwayland {
    force_zero_scaling = true
}

# Aplicaciones
bind = $mainMod, Return, exec, $terminal
bind = $mainMod ALT, Return, exec, $terminal --class float_kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, F, exec, $browser
bind = $mainMod SHIFT, W, exec, waypaper
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, C, exec, code

# Foco
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, minus, workspace, 11
bind = $mainMod, equal, workspace, 12

bind = $mainMod SHIFT, minus, movetoworkspace, 11
bind = $mainMod SHIFT, equal, movetoworkspace, 12

bind = ALT, Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext, prev

# Mover ventana a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Audio
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Brillo
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Pantalla completa → guarda + copia
bind = , Print, exec, hyprshot -m output -o ~/Pictures/Screenshots --clipboard-only

# Ventana activa → guarda + copia  
bind = $mainMod, Print, exec, hyprshot -m window -o ~/Pictures/Screenshots --clipboard-only

# Selección de zona → guarda + copia
bind = $mainMod SHIFT, Print, exec, hyprshot -m region -o ~/Pictures/Screenshots --clipboard-only

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll entre workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mover/redimensionar con mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , mouse:275, exec, hyprshot -m output -o ~/Pictures/Screenshots --clipboard-only
bind = , mouse:276, killactive

# monitor = HDMI-A-1, 1920x1080@60, 1366x0, 1  # <- especifico de la laptop original, revisa/ajusta
# monitor = eDP-1, 1366x768@60, 0x0, 1  # <- especifico de la laptop original, revisa/ajusta
monitor = ,preferred,auto,1

exec-once = ~/.config/hypr/scripts/monitor-setup.sh

bind = , monitoradded, exec, ~/.config/hypr/scripts/monitor-setup.sh
bind = , monitorremoved, exec, ~/.config/hypr/scripts/monitor-setup.sh

workspace = 1, monitor:HDMI-A-1, persistent:true
workspace = 2, monitor:HDMI-A-1, persistent:true
workspace = 3, monitor:HDMI-A-1, persistent:true
workspace = 4, monitor:HDMI-A-1, persistent:true
workspace = 5, monitor:HDMI-A-1, persistent:true
workspace = 6, monitor:HDMI-A-1, persistent:true
workspace = 7, monitor:eDP-1, persistent:true
workspace = 8, monitor:eDP-1, persistent:true
workspace = 9, monitor:eDP-1, persistent:true
workspace = 10, monitor:eDP-1, persistent:true
workspace = 11, monitor:eDP-1, persistent:true
workspace = 12, monitor:eDP-1, persistent:true
